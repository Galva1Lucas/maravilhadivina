<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Prece Especial – Paz ao Coração</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ANTI-CLONE (visual) */
    * { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-touch-callout: none; }
    img { pointer-events: none; -webkit-user-drag: none; }
    @media print { body { display: none !important; } }

    /* RESET */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* BASE */
    html { font-size: 16px; }
    body {
      font-family: 'Lato', sans-serif;
      background: #ffffff;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* VSL SECTION */
    .vsl-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 12px;
      gap: 24px;
      min-height: 100vh;
      justify-content: center;
    }

    /* VSL wrapper — grande, focado pra mobile */
    .vsl-wrapper {
      width: 100%;
      max-width: 480px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 36px rgba(0,0,0,0.20), 0 3px 10px rgba(0,0,0,0.10);
      background: #000;
    }
    .vsl-wrapper wistia-player {
      display: block;
      width: 100%;
    }

    /* CTA */
    .cta-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
      padding: 0 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .cta-wrap.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .cta-btn {
      display: block;
      width: 100%;
      max-width: 320px;
      background: linear-gradient(135deg, #28a745, #1e8c38);
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-weight: 900;
      font-size: clamp(1rem, 5vw, 1.15rem);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 18px 24px;
      border-radius: 50px;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 6px 24px rgba(40,167,69,0.45);
      animation: bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      45%       { transform: translateY(-7px); }
      65%       { transform: translateY(-4px); }
    }
  </style>

  <!-- Utmify Pixel -->
  <script>
    window.pixelId = "6a5c22915641720d707f9395";
    var a = document.createElement("script");
    a.setAttribute("async", "");
    a.setAttribute("defer", "");
    a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
    document.head.appendChild(a);
  </script>
  <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck data-utmify-prevent-subids async defer></script>

  <!-- Wistia -->
  <script src="https://fast.wistia.com/player.js" async></script>
  <script src="https://fast.wistia.com/embed/le6x384w9v.js" async type="module"></script>
  <style>
    wistia-player[media-id='le6x384w9v']:not(:defined) {
      background: center / contain no-repeat url('https://fast.wistia.com/embed/medias/le6x384w9v/swatch');
      display: block;
      filter: blur(5px);
      padding-top: 178.06%;
    }
  </style>
</head>
<body>

  <section class="vsl-section">
    <div class="vsl-wrapper">
      <wistia-player media-id="le6x384w9v" aspect="0.5616224648985959"></wistia-player>
    </div>

    <div class="cta-wrap" id="ctaWrap">
      <a class="cta-btn" href="https://go.perfectpay.com.br/PPU38CQCPPN" >
        QUERO ADQUIRIR E ATIVAR O PODER DE RECEBER AGORA
      </a>
    </div>
  </section>

  <script>
    /* ===== ANTI-CLONE: verificação de domínio ===== */
    (function checkDomain() {
      var dominioOficial = "maravilhadivina.vercel.app";
      var checkoutURL = "https://go.perfectpay.com.br/PPU38CQCPPN";
      var hostAtual = window.location.hostname;

      // permite localhost/127.0.0.1 para você testar localmente antes de publicar
      var ambientesDeTeste = ["localhost", "127.0.0.1"];

      var ehOficial = hostAtual === dominioOficial;
      var ehTeste = ambientesDeTeste.indexOf(hostAtual) !== -1;

      if (!ehOficial && !ehTeste) {
        window.location.replace(checkoutURL);
      }
    })();

    /* PROTEÇÕES */
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart',   e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('copy',        e => e.preventDefault());
    document.addEventListener('cut',         e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
      const blocked =
        e.key === 'F12' ||
        (e.ctrlKey && ['u','U','s','S','a','A'].includes(e.key)) ||
        (e.ctrlKey && e.shiftKey && ['i','I','j','J','c','C','k','K'].includes(e.key));
      if (blocked) { e.preventDefault(); e.stopPropagation(); }
    });
    (function devToolsDetect() {
      setInterval(() => {
        if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
          document.body.innerHTML = '';
          window.location.replace('about:blank');
        }
      }, 1000);
    })();

    /* CTA TIMER — aparece em 30 minutos */
    const ctaWrap = document.getElementById('ctaWrap');
    function showCTA() { ctaWrap.classList.add('visible'); }
    const fallbackTimer = setTimeout(showCTA, 1302 * 1000); // 21:42
    window._wq = window._wq || [];
    _wq.push({ id: 'le6x384w9v', onReady: function(video) {
      video.bind('secondchange', function(s) {
        if (s >= 1302) { showCTA(); clearTimeout(fallbackTimer); video.unbind('secondchange'); } // 21:42
      });
    }});
  </script>

</body>
</html>
